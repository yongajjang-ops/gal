<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러그 - Galaga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 3px solid #333;
            background-color: #000;
        }

        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .score-display {
            color: #ff0000;
        }

        .high-score {
            color: #ff0000;
        }

        .lives-display {
            color: #00ffff;
        }

        .stage-display {
            color: #ffff00;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
        }

        #startScreen h1 {
            color: #ff0000;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff0000;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
            to { text-shadow: 0 0 20px #ff0000, 0 0 40px #ff6600, 0 0 60px #ff0000; }
        }

        #startScreen p, #gameOverScreen p {
            color: #fff;
            font-size: 16px;
            margin: 10px 0;
        }

        .blink {
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #gameOverScreen h2 {
            color: #ff0000;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .controls-info {
            margin-top: 30px;
            color: #00ff00;
            font-size: 12px;
            text-align: center;
            line-height: 2;
        }

        .speed-selector {
            margin-top: 30px;
            text-align: center;
        }

        .speed-selector h3 {
            color: #ffff00;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .speed-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .speed-btn {
            padding: 10px 20px;
            font-size: 12px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            border: 2px solid #00ff00;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            cursor: pointer;
            transition: all 0.3s;
        }

        .speed-btn:hover {
            background: rgba(0, 255, 0, 0.3);
        }

        .speed-btn.selected {
            background: rgba(0, 255, 0, 0.5);
            border-color: #00ffff;
            color: #ffffff;
        }

        .speed-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #00ff00;
            font-size: 10px;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .speed-btn {
                padding: 8px 12px;
                font-size: 10px;
            }
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            z-index: 50;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .move-buttons {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #00ff00;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            font-size: 24px;
            font-weight: bold;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:active {
            background: rgba(0, 255, 0, 0.5);
        }

        .fire-btn {
            width: 90px;
            height: 90px;
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
        }

        .fire-btn:active {
            background: rgba(255, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: block;
            }
            #startScreen h1 {
                font-size: 32px;
            }
            .controls-info {
                font-size: 10px;
            }
        }

        @media (pointer: coarse) {
            .mobile-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="480" height="640"></canvas>

        <div id="startScreen">
            <h1>GALAGA</h1>
            <p style="color: #ffff00;">- 1981 ARCADE CLASSIC -</p>
            <p class="blink" style="margin-top: 40px;">PRESS SPACE OR TAP TO START</p>
            <div class="speed-selector">
                <h3>게임 속도 선택 / SPEED</h3>
                <div class="speed-buttons">
                    <button class="speed-btn" data-speed="0.5">느림<br>SLOW</button>
                    <button class="speed-btn selected" data-speed="1">보통<br>NORMAL</button>
                    <button class="speed-btn" data-speed="1.5">빠름<br>FAST</button>
                    <button class="speed-btn" data-speed="2">매우빠름<br>EXTREME</button>
                </div>
            </div>
            <div class="controls-info">
                <p>← → : 이동 / MOVE</p>
                <p>SPACE : 발사 / FIRE</p>
                <p>1~4 : 속도 변경 (게임 중)</p>
                <p>적을 모두 물리치고 스테이지를 클리어하세요!</p>
            </div>
        </div>

        <div id="gameOverScreen" style="display: none;">
            <h2>GAME OVER</h2>
            <p>SCORE: <span id="finalScore">0</span></p>
            <p>STAGE: <span id="finalStage">1</span></p>
            <p class="blink" style="margin-top: 30px;">PRESS SPACE OR TAP TO RESTART</p>
        </div>

        <div class="speed-indicator" id="speedIndicator" style="display: none;">
            SPEED: <span id="currentSpeed">NORMAL</span>
        </div>

        <div class="mobile-controls">
            <div class="control-row">
                <div class="move-buttons">
                    <button class="control-btn" id="leftBtn">◀</button>
                    <button class="control-btn" id="rightBtn">▶</button>
                </div>
                <button class="control-btn fire-btn" id="fireBtn">FIRE</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 사운드 시스템 ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let bgmPlaying = false;
        let bgmInterval = null;

        // 오디오 컨텍스트 초기화 (사용자 인터랙션 후)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 기본 사운드 생성 함수
        function playTone(frequency, duration, type = 'square', volume = 0.3, delay = 0) {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime + delay);

            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + delay);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);

            oscillator.start(audioCtx.currentTime + delay);
            oscillator.stop(audioCtx.currentTime + delay + duration);
        }

        // 플레이어 발사음
        function playShootSound() {
            if (!audioCtx) return;
            playTone(880, 0.1, 'square', 0.2);
            playTone(440, 0.05, 'square', 0.15, 0.05);
        }

        // 적 폭발음
        function playExplosionSound() {
            if (!audioCtx) return;

            // 노이즈 생성
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);

            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            noise.start();
            noise.stop(audioCtx.currentTime + 0.2);

            // 저음 추가
            playTone(150, 0.15, 'sine', 0.3);
            playTone(80, 0.2, 'sine', 0.2, 0.05);
        }

        // 플레이어 피격음
        function playPlayerHitSound() {
            if (!audioCtx) return;

            // 큰 폭발음
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);

            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            noise.start();
            noise.stop(audioCtx.currentTime + 0.5);

            // 하강 톤
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
            oscGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // 적 발사음
        function playEnemyShootSound() {
            if (!audioCtx) return;
            playTone(200, 0.1, 'sawtooth', 0.1);
            playTone(150, 0.08, 'square', 0.08, 0.03);
        }

        // 스테이지 클리어 사운드
        function playStageClearSound() {
            if (!audioCtx) return;
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                playTone(freq, 0.3, 'square', 0.25, i * 0.15);
            });
        }

        // 게임 오버 사운드
        function playGameOverSound() {
            if (!audioCtx) return;
            stopBGM();
            const notes = [392, 349, 330, 294, 262]; // G4 -> C4 하강
            notes.forEach((freq, i) => {
                playTone(freq, 0.4, 'square', 0.25, i * 0.3);
            });
        }

        // 게임 시작 사운드
        function playStartSound() {
            if (!audioCtx) return;
            const notes = [262, 330, 392, 523]; // C4, E4, G4, C5
            notes.forEach((freq, i) => {
                playTone(freq, 0.15, 'square', 0.2, i * 0.1);
            });
        }

        // 배경음악 (갤러그 스타일 BGM)
        function startBGM() {
            if (!audioCtx || bgmPlaying) return;
            bgmPlaying = true;

            // 갤러그 스타일 멜로디 패턴
            const melody = [
                // 메인 테마 패턴 1
                { note: 330, duration: 0.15 }, // E4
                { note: 330, duration: 0.15 },
                { note: 392, duration: 0.15 }, // G4
                { note: 440, duration: 0.15 }, // A4
                { note: 523, duration: 0.3 },  // C5
                { note: 440, duration: 0.15 }, // A4
                { note: 392, duration: 0.3 },  // G4
                { note: 0, duration: 0.15 },   // 쉼표

                // 패턴 2
                { note: 330, duration: 0.15 }, // E4
                { note: 392, duration: 0.15 }, // G4
                { note: 440, duration: 0.15 }, // A4
                { note: 392, duration: 0.15 }, // G4
                { note: 330, duration: 0.3 },  // E4
                { note: 294, duration: 0.15 }, // D4
                { note: 262, duration: 0.3 },  // C4
                { note: 0, duration: 0.15 },   // 쉼표

                // 패턴 3 - 긴장감
                { note: 392, duration: 0.15 }, // G4
                { note: 392, duration: 0.15 },
                { note: 440, duration: 0.15 }, // A4
                { note: 494, duration: 0.15 }, // B4
                { note: 523, duration: 0.3 },  // C5
                { note: 587, duration: 0.15 }, // D5
                { note: 523, duration: 0.3 },  // C5
                { note: 0, duration: 0.15 },

                // 패턴 4 - 하강
                { note: 494, duration: 0.15 }, // B4
                { note: 440, duration: 0.15 }, // A4
                { note: 392, duration: 0.15 }, // G4
                { note: 330, duration: 0.15 }, // E4
                { note: 294, duration: 0.3 },  // D4
                { note: 262, duration: 0.3 },  // C4
                { note: 0, duration: 0.3 },
            ];

            // 베이스 라인
            const bassLine = [
                { note: 131, duration: 0.3 }, // C3
                { note: 131, duration: 0.3 },
                { note: 165, duration: 0.3 }, // E3
                { note: 165, duration: 0.3 },
                { note: 196, duration: 0.3 }, // G3
                { note: 196, duration: 0.3 },
                { note: 165, duration: 0.3 }, // E3
                { note: 147, duration: 0.3 }, // D3
            ];

            let melodyIndex = 0;
            let bassIndex = 0;
            let melodyTime = 0;
            let bassTime = 0;

            const tempo = 180; // BPM
            const beatDuration = 60 / tempo;

            function playBGMNote() {
                if (!bgmPlaying || !audioCtx) return;

                const currentTime = audioCtx.currentTime;

                // 멜로디 재생
                if (melodyTime <= 0) {
                    const note = melody[melodyIndex];
                    if (note.note > 0) {
                        playTone(note.note, note.duration * 0.9, 'square', 0.12);
                    }
                    melodyTime = note.duration;
                    melodyIndex = (melodyIndex + 1) % melody.length;
                }

                // 베이스 재생
                if (bassTime <= 0) {
                    const bass = bassLine[bassIndex];
                    if (bass.note > 0) {
                        playTone(bass.note, bass.duration * 0.8, 'triangle', 0.15);
                    }
                    bassTime = bass.duration;
                    bassIndex = (bassIndex + 1) % bassLine.length;
                }

                const interval = 0.075;
                melodyTime -= interval;
                bassTime -= interval;
            }

            bgmInterval = setInterval(playBGMNote, 75);
        }

        function stopBGM() {
            bgmPlaying = false;
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        // 보너스 점수 사운드
        function playBonusSound() {
            if (!audioCtx) return;
            playTone(784, 0.1, 'square', 0.2);
            playTone(988, 0.1, 'square', 0.2, 0.1);
            playTone(1175, 0.15, 'square', 0.25, 0.2);
        }

        // ==================== 캔버스 설정 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 게임 상태
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let highScore = localStorage.getItem('galagaHighScore') || 0;
        let lives = 3;
        let stage = 1;
        let gameLoop;

        // 속도 조절 설정
        let gameSpeed = 1; // 기본 속도 배율
        const speedNames = { 0.5: 'SLOW', 1: 'NORMAL', 1.5: 'FAST', 2: 'EXTREME' };

        // 속도 버튼 이벤트
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                gameSpeed = parseFloat(btn.dataset.speed);
                updateSpeedIndicator();
            });
        });

        function updateSpeedIndicator() {
            document.getElementById('currentSpeed').textContent = speedNames[gameSpeed] || gameSpeed.toFixed(1);
        }

        // 플레이어 설정
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 80,
            width: 40,
            height: 40,
            speed: 5,
            bullets: [],
            maxBullets: 10,
            isAlive: true,
            respawnTimer: 0,
            captured: false
        };

        // 적 설정
        let enemies = [];
        let enemyBullets = [];
        let attackingEnemies = [];
        let bossWithCapturedShip = null;

        // 적 편대 설정
        const formation = {
            x: 40,
            y: 60,
            direction: 1,
            speed: 0.5,
            moveTimer: 0
        };

        // 파티클 효과
        let particles = [];
        let explosions = [];

        // 별 배경
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }

        // 입력 처리
        const keys = {
            left: false,
            right: false,
            fire: false
        };

        let canFire = true;
        let fireDelay = 150; // 연속 발사 딜레이 (ms)

        // 키보드 이벤트
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start' || gameState === 'gameover') {
                    startGame();
                } else if (gameState === 'playing') {
                    keys.fire = true;
                }
            }
            // 게임 중 속도 변경 (1~4 키)
            if (e.code === 'Digit1' || e.code === 'Numpad1') {
                setGameSpeed(0.5);
            } else if (e.code === 'Digit2' || e.code === 'Numpad2') {
                setGameSpeed(1);
            } else if (e.code === 'Digit3' || e.code === 'Numpad3') {
                setGameSpeed(1.5);
            } else if (e.code === 'Digit4' || e.code === 'Numpad4') {
                setGameSpeed(2);
            }
        });

        function setGameSpeed(speed) {
            gameSpeed = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (parseFloat(btn.dataset.speed) === speed) {
                    btn.classList.add('selected');
                }
            });
            updateSpeedIndicator();
        }

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space') keys.fire = false;
        });

        // 터치/클릭 이벤트
        canvas.addEventListener('click', () => {
            initAudio();
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            }
        });

        // 터치 시작 시 오디오 초기화
        document.addEventListener('touchstart', () => {
            initAudio();
        }, { once: true });

        // 모바일 컨트롤
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const fireBtn = document.getElementById('fireBtn');

        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });
        fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.fire = true; });
        fireBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.fire = false; });

        // 적 타입 정의
        const enemyTypes = {
            bee: { width: 30, height: 30, points: 50, color: '#ffff00', health: 1 },
            butterfly: { width: 30, height: 30, points: 80, color: '#ff00ff', health: 1 },
            boss: { width: 36, height: 36, points: 150, color: '#00ff00', health: 2, canCapture: true }
        };

        // 스테이지 초기화
        function initStage() {
            enemies = [];
            enemyBullets = [];
            attackingEnemies = [];
            formation.x = 40;
            formation.direction = 1;

            // 보스 (상단 2줄)
            for (let row = 0; row < 2; row++) {
                for (let col = 0; col < 8; col++) {
                    enemies.push(createEnemy('boss', col, row));
                }
            }

            // 나비 (중간 2줄)
            for (let row = 2; row < 4; row++) {
                for (let col = 0; col < 10; col++) {
                    enemies.push(createEnemy('butterfly', col, row));
                }
            }

            // 벌 (하단 2줄)
            for (let row = 4; row < 6; row++) {
                for (let col = 0; col < 10; col++) {
                    enemies.push(createEnemy('bee', col, row));
                }
            }
        }

        function createEnemy(type, col, row) {
            const typeData = enemyTypes[type];
            const spacing = 40;
            const offsetX = type === 'boss' ? 20 : 0;

            return {
                type: type,
                x: 0,
                y: -50,
                targetX: col * spacing + offsetX,
                targetY: row * 40 + 50,
                formationCol: col,
                formationRow: row,
                width: typeData.width,
                height: typeData.height,
                points: typeData.points,
                color: typeData.color,
                health: typeData.health,
                maxHealth: typeData.health,
                inFormation: false,
                entering: true,
                enterPhase: 0,
                enterTimer: (row * 10 + col) * 5,
                attacking: false,
                attackPath: [],
                attackIndex: 0,
                angle: 0,
                capturedShip: null
            };
        }

        // 게임 시작
        function startGame() {
            initAudio();
            gameState = 'playing';
            score = 0;
            lives = 3;
            stage = 1;
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 80;
            player.isAlive = true;
            player.bullets = [];
            player.captured = false;
            player.maxBullets = 10;
            particles = [];
            explosions = [];

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('speedIndicator').style.display = 'block';
            updateSpeedIndicator();

            playStartSound();
            setTimeout(() => startBGM(), 500);
            initStage();
        }

        // 게임 오버
        function gameOver() {
            gameState = 'gameover';
            stopBGM();
            playGameOverSound();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('galagaHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStage').textContent = stage;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('speedIndicator').style.display = 'none';
        }

        // 다음 스테이지
        function nextStage() {
            stage++;
            playStageClearSound();
            initStage();
            // 스테이지 알림 효과
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                text: `STAGE ${stage}`,
                life: 120,
                type: 'text'
            });
        }

        // 플레이어 그리기 (우주선)
        function drawPlayer() {
            if (!player.isAlive) return;

            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // 우주선 본체
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.lineTo(-player.width / 4, player.height / 3);
            ctx.lineTo(0, player.height / 2.5);
            ctx.lineTo(player.width / 4, player.height / 3);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fill();

            // 날개 디테일
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 3);
            ctx.lineTo(-player.width / 3, player.height / 4);
            ctx.lineTo(0, player.height / 5);
            ctx.lineTo(player.width / 3, player.height / 4);
            ctx.closePath();
            ctx.fill();

            // 엔진 불꽃
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(-player.width / 6, player.height / 2.5);
            ctx.lineTo(0, player.height / 2 + Math.random() * 8 + 5);
            ctx.lineTo(player.width / 6, player.height / 2.5);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // 적 그리기
        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
            ctx.rotate(enemy.angle);

            if (enemy.type === 'boss') {
                // 보스 적
                ctx.fillStyle = enemy.health === 2 ? '#00ff00' : '#00aa00';
                // 본체
                ctx.beginPath();
                ctx.arc(0, 0, enemy.width / 2, 0, Math.PI * 2);
                ctx.fill();
                // 눈
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(-6, -5, 4, 0, Math.PI * 2);
                ctx.arc(6, -5, 4, 0, Math.PI * 2);
                ctx.fill();
                // 뿔
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.moveTo(-10, -enemy.height / 2 + 5);
                ctx.lineTo(-8, -enemy.height / 2 - 8);
                ctx.lineTo(-4, -enemy.height / 2 + 5);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(4, -enemy.height / 2 + 5);
                ctx.lineTo(8, -enemy.height / 2 - 8);
                ctx.lineTo(10, -enemy.height / 2 + 5);
                ctx.fill();

                // 캡처된 플레이어 배
                if (enemy.capturedShip) {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.moveTo(0, enemy.height / 2 + 5);
                    ctx.lineTo(-10, enemy.height / 2 + 20);
                    ctx.lineTo(10, enemy.height / 2 + 20);
                    ctx.closePath();
                    ctx.fill();
                }
            } else if (enemy.type === 'butterfly') {
                // 나비 적
                ctx.fillStyle = enemy.color;
                // 날개
                ctx.beginPath();
                ctx.ellipse(-10, 0, 8, 12, Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(10, 0, 8, 12, -Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();
                // 몸통
                ctx.fillStyle = '#ff00aa';
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 10, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 벌 적
                ctx.fillStyle = enemy.color;
                // 몸통
                ctx.beginPath();
                ctx.ellipse(0, 0, 10, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                // 줄무늬
                ctx.fillStyle = '#000';
                ctx.fillRect(-10, -3, 20, 3);
                ctx.fillRect(-10, 3, 20, 3);
                // 날개
                ctx.fillStyle = '#ffffaa';
                ctx.beginPath();
                ctx.ellipse(-12, -5, 6, 8, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(12, -5, 6, 8, -Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // 총알 그리기
        function drawBullet(bullet, isEnemy = false) {
            ctx.fillStyle = isEnemy ? '#ff6600' : '#00ffff';
            ctx.fillRect(bullet.x - 2, bullet.y - 6, 4, 12);

            // 발광 효과
            ctx.shadowBlur = 10;
            ctx.shadowColor = isEnemy ? '#ff6600' : '#00ffff';
            ctx.fillRect(bullet.x - 2, bullet.y - 6, 4, 12);
            ctx.shadowBlur = 0;
        }

        // 폭발 효과
        function createExplosion(x, y, color = '#ff6600') {
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 / 15) * i;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    color: color,
                    size: Math.random() * 4 + 2,
                    type: 'explosion'
                });
            }
        }

        // 파티클 업데이트 및 그리기
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life--;

                if (p.type === 'text') {
                    ctx.fillStyle = `rgba(255, 255, 0, ${p.life / 120})`;
                    ctx.font = '24px "Press Start 2P", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;

                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 별 배경 업데이트
        function updateStars() {
            ctx.fillStyle = '#fff';
            for (let star of stars) {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.globalAlpha = 0.5 + star.size / 4;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // 적 이동 (편대 진입)
        function updateEnemyEntering(enemy) {
            if (enemy.enterTimer > 0) {
                enemy.enterTimer -= gameSpeed;
                return;
            }

            const targetX = formation.x + enemy.targetX;
            const targetY = enemy.targetY;

            if (enemy.enterPhase === 0) {
                // 위에서 들어오기
                enemy.y += 3 * gameSpeed;
                enemy.x = targetX + Math.sin(enemy.y / 20) * 30;
                if (enemy.y >= targetY) {
                    enemy.enterPhase = 1;
                }
            } else {
                // 위치 조정
                const dx = targetX - enemy.x;
                const dy = targetY - enemy.y;
                enemy.x += dx * 0.1 * gameSpeed;
                enemy.y += dy * 0.1 * gameSpeed;

                if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
                    enemy.entering = false;
                    enemy.inFormation = true;
                    enemy.x = targetX;
                    enemy.y = targetY;
                }
            }
        }

        // 편대 이동
        function updateFormation() {
            formation.x += formation.speed * formation.direction * gameSpeed;

            if (formation.x > 80 || formation.x < 0) {
                formation.direction *= -1;
            }

            for (let enemy of enemies) {
                if (enemy.inFormation && !enemy.attacking) {
                    enemy.x = formation.x + enemy.targetX;
                }
            }
        }

        // 적 공격 패턴
        function startEnemyAttack(enemy) {
            if (enemy.attacking || enemy.entering) return;

            enemy.attacking = true;
            enemy.inFormation = false;
            enemy.attackPath = generateAttackPath(enemy);
            enemy.attackIndex = 0;
        }

        function generateAttackPath(enemy) {
            const path = [];
            const startX = enemy.x;
            const startY = enemy.y;
            const playerX = player.x + player.width / 2;

            // 곡선 공격 경로 생성 (위에서 아래로만)
            const steps = 60;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                let x, y;

                if (enemy.type === 'boss') {
                    // 보스는 더 복잡한 패턴
                    x = startX + Math.sin(t * Math.PI * 2) * 100 + (playerX - startX) * t;
                    y = startY + t * (canvas.height + 50 - startY);
                } else {
                    // 일반 적
                    x = startX + Math.sin(t * Math.PI * 3) * 80 + (playerX - startX) * t * 0.5;
                    y = startY + t * (canvas.height + 50 - startY);
                }

                path.push({ x, y });
            }

            // 아래로 내려간 후 바로 편대로 복귀 (올라오는 경로 제거)
            return path;
        }

        function updateAttackingEnemy(enemy) {
            // 속도에 따라 여러 프레임 이동 가능
            const moveSteps = Math.ceil(gameSpeed);
            for (let step = 0; step < moveSteps; step++) {
                if (enemy.attackIndex < enemy.attackPath.length) {
                    const target = enemy.attackPath[enemy.attackIndex];
                    const dx = target.x - enemy.x;
                    const dy = target.y - enemy.y;

                    enemy.angle = Math.atan2(dy, dx) + Math.PI / 2;
                    enemy.x = target.x;
                    enemy.y = target.y;
                    enemy.attackIndex++;

                    // 가끔 총알 발사
                    if (Math.random() < 0.02 * gameSpeed && enemy.y < canvas.height - 100) {
                        enemyBullets.push({
                            x: enemy.x + enemy.width / 2,
                            y: enemy.y + enemy.height,
                            vy: 5 * gameSpeed
                        });
                        playEnemyShootSound();
                    }
                } else {
                    // 공격 완료, 편대로 복귀
                    enemy.attacking = false;
                    enemy.inFormation = true;
                    enemy.angle = 0;
                    enemy.x = formation.x + enemy.targetX;
                    enemy.y = enemy.targetY;
                    break;
                }
            }
        }

        // 충돌 감지
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // 플레이어 업데이트
        function updatePlayer() {
            if (!player.isAlive) {
                player.respawnTimer--;
                if (player.respawnTimer <= 0 && lives > 0) {
                    player.isAlive = true;
                    player.x = canvas.width / 2 - 20;
                }
                return;
            }

            // 이동 (플레이어 속도는 게임 속도와 독립적으로 유지, 반응성 보장)
            const playerMoveSpeed = player.speed * Math.max(1, gameSpeed * 0.7);
            if (keys.left && player.x > 10) {
                player.x -= playerMoveSpeed;
            }
            if (keys.right && player.x < canvas.width - player.width - 10) {
                player.x += playerMoveSpeed;
            }

            // 발사
            if (keys.fire && canFire && player.bullets.length < player.maxBullets) {
                player.bullets.push({
                    x: player.x + player.width / 2,
                    y: player.y,
                    width: 4,
                    height: 12
                });
                playShootSound();
                canFire = false;
                setTimeout(() => canFire = true, fireDelay);
            }
        }

        // 총알 업데이트
        function updateBullets() {
            // 플레이어 총알
            for (let i = player.bullets.length - 1; i >= 0; i--) {
                const bullet = player.bullets[i];
                bullet.y -= 10 * gameSpeed;

                if (bullet.y < 0) {
                    player.bullets.splice(i, 1);
                    continue;
                }

                // 적과 충돌 체크
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (checkCollision(bullet, enemy)) {
                        player.bullets.splice(i, 1);
                        enemy.health--;

                        if (enemy.health <= 0) {
                            // 적 처치
                            let points = enemy.points;
                            if (enemy.attacking) points *= 2; // 공격 중인 적은 2배 점수
                            score += points;

                            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                            playExplosionSound();

                            // 캡처된 배가 있으면 해방
                            if (enemy.capturedShip) {
                                player.maxBullets = 15; // 더블 샷 효과 (더 많은 총알)
                                score += 500;
                                playBonusSound();
                            }

                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // 적 총알
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                bullet.y += bullet.vy * gameSpeed;

                if (bullet.y > canvas.height) {
                    enemyBullets.splice(i, 1);
                    continue;
                }

                // 플레이어와 충돌
                if (player.isAlive && checkCollision({ x: bullet.x - 4, y: bullet.y - 6, width: 8, height: 12 }, player)) {
                    enemyBullets.splice(i, 1);
                    playerHit();
                }
            }
        }

        // 플레이어 피격
        function playerHit() {
            lives--;
            player.isAlive = false;
            player.respawnTimer = 120;
            createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#00ffff');
            playPlayerHitSound();

            if (lives <= 0) {
                gameOver();
            }
        }

        // 적 업데이트
        function updateEnemies() {
            updateFormation();

            for (let enemy of enemies) {
                if (enemy.entering) {
                    updateEnemyEntering(enemy);
                } else if (enemy.attacking) {
                    updateAttackingEnemy(enemy);
                }

                // 플레이어와 충돌
                if (player.isAlive && !enemy.entering && checkCollision(enemy, player)) {
                    playerHit();
                    enemy.health = 0;
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
                    enemies.splice(enemies.indexOf(enemy), 1);
                }
            }

            // 랜덤하게 공격 시작 (속도에 따라 공격 빈도 조절)
            if (Math.random() < (0.01 + stage * 0.002) * gameSpeed) {
                const formationEnemies = enemies.filter(e => e.inFormation && !e.attacking);
                if (formationEnemies.length > 0) {
                    const attacker = formationEnemies[Math.floor(Math.random() * formationEnemies.length)];
                    startEnemyAttack(attacker);
                }
            }

            // 스테이지 클리어 체크
            if (enemies.length === 0) {
                nextStage();
            }
        }

        // UI 그리기
        function drawUI() {
            ctx.fillStyle = '#ff0000';
            ctx.font = '16px "Press Start 2P", monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 25);

            ctx.textAlign = 'center';
            ctx.fillText(`HIGH: ${highScore}`, canvas.width / 2, 25);

            ctx.textAlign = 'right';
            ctx.fillStyle = '#ffff00';
            ctx.fillText(`STAGE ${stage}`, canvas.width - 10, 25);

            // 라이프 표시
            ctx.fillStyle = '#00ffff';
            for (let i = 0; i < lives; i++) {
                ctx.save();
                ctx.translate(20 + i * 25, canvas.height - 25);
                ctx.scale(0.5, 0.5);
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(-15, 15);
                ctx.lineTo(0, 10);
                ctx.lineTo(15, 15);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // 메인 게임 루프
        function update() {
            // 화면 지우기
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 별 배경
            updateStars();

            if (gameState === 'playing') {
                updatePlayer();
                updateBullets();
                updateEnemies();

                // 그리기
                drawPlayer();

                for (let enemy of enemies) {
                    drawEnemy(enemy);
                }

                for (let bullet of player.bullets) {
                    drawBullet(bullet);
                }

                for (let bullet of enemyBullets) {
                    drawBullet(bullet, true);
                }

                updateParticles();
                drawUI();
            }

            requestAnimationFrame(update);
        }

        // 게임 시작
        update();
    </script>
</body>
</html>
