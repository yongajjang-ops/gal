  <!-- ===== Player Spaceship ===== -->
  <!-- Body (white) — same shape as in-game, scaled to w=h=120, center (256,390) -->
  <!-- nose=(256,330) wingL=(196,450) innerL=(226,430) bot=(256,438) innerR=(286,430) wingR=(316,450) -->
  <polygon points="256,330 196,450 226,430 256,438 286,430 316,450"
           fill="#ffffff" filter="url(#glow)"/>
  <!-- Cockpit (cyan) -->
  <polygon points="256,350 216,430 256,420 296,430"
           fill="#00ffff" opacity="0.9"/>
  <!-- Engine flame outer -->
  <ellipse cx="256" cy="440" rx="24" ry="12" fill="#ff3300" opacity="0.20"/>
  <polygon points="236,438 256,480 276,438" fill="#ff6600" filter="url(#glow)"/>
  <!-- Engine flame mid -->
  <polygon points="243,438 256,465 269,438" fill="#ffaa00"/>
  <!-- Engine flame core -->
  <polygon points="249,438 256,452 263,438" fill="#ffffff" opacity="0.9"/>

  <!-- GALAGA title (drawn last — topmost layer) -->
